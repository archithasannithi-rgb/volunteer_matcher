<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volunteer Matcher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 600px; }
        #resultArea, #errorArea { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Volunteer Registration</h2>
        
        <div id="errorArea" class="alert alert-danger"></div>

        <form id="matchForm">
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" id="userName" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Age</label>
                <input type="number" id="userAge" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>City</label>
                <input type="text" id="userCity" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Available Hours</label>
                <input type="text" id="userHours" class="form-control" placeholder="e.g. 10 hrs/week" required>
            </div>
            <div class="mb-3">
                <label>Skills</label>
                <textarea id="userSkills" class="form-control" rows="3" required></textarea>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary w-100">Find My Match</button>
        </form>

        <div id="resultArea" class="alert alert-success">
            <h4>Match: <span id="matchResult"></span></h4>
            <hr>
            <p id="explanationResult"></p>
        </div>
    </div>
</div>

<script>
    document.getElementById('matchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // UI Reset
        const btn = document.getElementById('submitBtn');
        const errorArea = document.getElementById('errorArea');
        const resultArea = document.getElementById('resultArea');
        
        errorArea.style.display = 'none';
        resultArea.style.display = 'none';
        btn.disabled = true;
        btn.innerText = "Processing...";

        const payload = {
            name: document.getElementById('userName').value,
            age: document.getElementById('userAge').value,
            city: document.getElementById('userCity').value,
            hours: document.getElementById('userHours').value,
            skills: document.getElementById('userSkills').value
        };

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                // If Age is correct and Match is found
                document.getElementById('matchResult').innerText = data.match;
                document.getElementById('explanationResult').innerText = data.explanation;
                resultArea.style.display = 'block';
            } else {
                // If Age is < 17 or > 75, this shows the "Not Eligible" message
                errorArea.innerText = data.error;
                errorArea.style.display = 'block';
            }
        } catch (err) {
            errorArea.innerText = "Server connection failed.";
            errorArea.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerText = "Find My Match";
        }
    });
</script>

</body>
</html>
